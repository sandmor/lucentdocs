
[package]
edition = "2021"
name = "core"
publish = false
version = "0.1.0"

[lib]
crate-type = ["cdylib"]

[features]
default = ["sqlite-system"]
sqlite-system = ["libsqlite3-sys/pkg-config"]
sqlite-bundled = ["libsqlite3-sys/bundled"]

[dependencies]
ego-tree = "0.10"
libsqlite3-sys = { version = "0.30.1", default-features = false }
nanoid = "0.4"
napi = { version = "3", features = ["tokio_rt"] }
napi-derive = "3"
pulldown-cmark = "0.13"
scraper = "0.25"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio", "sqlite", "macros"] }
sqlite-vec = "0.1.9"
tokio = { version = "1", features = ["rt", "sync", "time", "macros"] }
tempfile = "3"
rayon = "1.10"
unicode-segmentation = "1.12"
yrs = "0.25"
tiktoken-rs = "0.9.1"

[build-dependencies]
napi-build = "2"
pkg-config = "0.3"
