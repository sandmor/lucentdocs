
[package]
edition = "2021"
name = "core"
publish = false
version = "0.1.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
ego-tree = "0.10"
nanoid = "0.4"
napi = { version = "3", features = ["tokio_rt"] }
napi-derive = "3"
pulldown-cmark = "0.13"
scraper = "0.25"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite"] }

[build-dependencies]
napi-build = "2"
