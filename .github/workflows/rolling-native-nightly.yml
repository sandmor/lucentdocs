name: Rolling Native Nightly

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: nightly-native-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        settings:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            platform: windows
            arch: x64
            build_flags: ''

          - target: x86_64-apple-darwin
            os: macos-latest
            platform: darwin
            arch: x64
            build_flags: ''

          - target: aarch64-apple-darwin
            os: macos-latest
            platform: darwin
            arch: arm64
            build_flags: ''

          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux
            arch: x64
            build_flags: ''

          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            platform: linux
            arch: x64-musl
            build_flags: '--cross-compile'

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux
            arch: arm64
            build_flags: '--cross-compile'

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            platform: linux
            arch: arm64-musl
            build_flags: '--cross-compile'

          - target: aarch64-linux-android
            os: ubuntu-latest
            platform: android
            arch: arm64
            build_flags: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: 'native-${{ matrix.settings.target }}'
          workspaces: 'packages/core -> target'

      - name: Setup Bun Cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Add Rust target
        run: rustup target add ${{ matrix.settings.target }}

      - name: Setup Zig
        if: ${{ contains(matrix.settings.build_flags, '--cross-compile') }}
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: ${{ contains(matrix.settings.build_flags, '--cross-compile') }}
        run: pipx install cargo-zigbuild

      - name: Setup Android NDK
        if: ${{ matrix.settings.target == 'aarch64-linux-android' }}
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Build addon
        shell: bash
        run: |
          set -euo pipefail
          rm -f packages/core/*.node

          if [[ "${{ matrix.settings.target }}" == "aarch64-linux-android" ]]; then
            export PATH="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
            export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=aarch64-linux-android24-clang
            export CC_aarch64_linux_android=aarch64-linux-android24-clang
            export CXX_aarch64_linux_android=aarch64-linux-android24-clang++
          fi

          build_cmd=(bunx napi build --platform --release --target "${{ matrix.settings.target }}")

          if [[ -n "${{ matrix.settings.build_flags }}" ]]; then
            build_cmd+=(${{ matrix.settings.build_flags }})
          fi

          cd packages/core
          "${build_cmd[@]}"

      - name: Normalize artifact filename
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          node_file=$(find packages/core -maxdepth 1 -type f -name '*.node' | head -n 1)
          if [[ -z "${node_file}" ]]; then
            echo "No .node artifact was produced for target ${{ matrix.settings.target }}"
            exit 1
          fi

          cp "${node_file}" artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-addon-${{ matrix.settings.platform }}-${{ matrix.settings.arch }}
          path: artifacts/*.node
          retention-days: 1

  publish-nightly:
    name: Publish rolling nightly release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all built artifacts
        uses: actions/download-artifact@v4
        with:
          path: compiled-binaries
          merge-multiple: true

      - name: Ensure nightly tag points to current commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh api "repos/${GITHUB_REPOSITORY}/git/refs/tags/nightly" >/dev/null 2>&1; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/git/refs/tags/nightly" -f sha="${GITHUB_SHA}" -F force=true >/dev/null
          else
            gh api -X POST "repos/${GITHUB_REPOSITORY}/git/refs" -f ref="refs/tags/nightly" -f sha="${GITHUB_SHA}" >/dev/null
          fi

      - name: Ensure nightly release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! gh release view nightly >/dev/null 2>&1; then
            gh release create nightly \
              --title "Nightly Edge Build" \
              --notes "Bleeding-edge build from the latest commit on master." \
              --prerelease
          fi

      - name: Delete old nightly binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mapfile -t assets < <(gh release view nightly --json assets --jq '.assets[].name')
          for asset in "${assets[@]}"; do
            gh release delete-asset nightly "${asset}" --yes
          done

      - name: Upload fresh nightly binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(compiled-binaries/*.node)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No nightly binaries found to upload"
            exit 1
          fi
          gh release upload nightly "${files[@]}" --clobber
